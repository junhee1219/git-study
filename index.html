    <title>Git 인터랙티브 가이드 — 본질부터</title>
    <script>
      // SPA fallback path restore — pairs with public/404.html.
      (function () {
        var l = window.location;
        if (l.search && l.search.indexOf('?p=') === 0) {
          var parts = l.search.slice(3).split('&');
          var p = parts.shift().replace(/~and~/g, '&');
          var rest = parts.length ? '?' + parts.join('&').replace(/~and~/g, '&') : '';
          history.replaceState(
            null,
            '',
            l.pathname.replace(/\/$/, '') + p + rest + l.hash,
          );
        }
      })();
    </script>
